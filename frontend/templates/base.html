<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}FacePresença{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0a0c0f;
      --bg2:      #111418;
      --bg3:      #181c22;
      --border:   #252b34;
      --accent:   #00e5a0;
      --accent2:  #0099ff;
      --danger:   #ff4560;
      --warn:     #ffb700;
      --text:     #e2e8f0;
      --muted:    #6b7a8d;
      --mono:     'Space Mono', monospace;
      --sans:     'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      min-height: 100vh;
      display: flex;
    }

    .sidebar {
      width: 220px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 28px 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
    }
    .sidebar-logo {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent);
      padding: 0 24px 28px;
      border-bottom: 1px solid var(--border);
      letter-spacing: 0.05em;
    }
    .sidebar-logo span { display: block; color: var(--muted); font-size: 10px; margin-top: 4px; }
    .nav { margin-top: 20px; flex: 1; }
    .nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 24px;
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: all .15s;
      border-left: 2px solid transparent;
    }
    .nav a:hover { color: var(--text); background: var(--bg3); }
    .nav a.active { color: var(--accent); border-left-color: var(--accent); background: rgba(0,229,160,.06); }
    .nav a .icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-status {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 10px;
    }
    .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; }
    .dot.on  { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .dot.off { background: var(--danger); }

    .main {
      margin-left: 220px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .topbar {
      height: 56px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 32px;
      gap: 12px;
      background: var(--bg2);
    }
    .topbar h1 { font-family: var(--mono); font-size: 13px; color: var(--muted); font-weight: 400; flex: 1; }
    .badge {
      font-family: var(--mono);
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 3px;
      border: 1px solid;
    }
    .badge.green { color: var(--accent); border-color: rgba(0,229,160,.3); background: rgba(0,229,160,.08); }
    .badge.red   { color: var(--danger); border-color: rgba(255,69,96,.3); background: rgba(255,69,96,.08); }
    .badge.blue  { color: var(--accent2); border-color: rgba(0,153,255,.3); background: rgba(0,153,255,.08); }

    .content { padding: 32px; flex: 1; }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
    }
    .card-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .card-value {
      font-family: var(--mono);
      font-size: 36px;
      font-weight: 700;
      color: var(--accent);
    }
    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 24px; }

    .btn {
      font-family: var(--mono);
      font-size: 12px;
      padding: 10px 20px;
      border-radius: 5px;
      border: 1px solid;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all .15s;
      font-weight: 700;
      letter-spacing: .04em;
    }
    .btn-primary { background: var(--accent); color: #000; border-color: var(--accent); }
    .btn-primary:hover { background: #00ffa8; border-color: #00ffa8; }
    .btn-ghost { background: transparent; color: var(--muted); border-color: var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
    .btn-danger { background: transparent; color: var(--danger); border-color: rgba(255,69,96,.4); }
    .btn-danger:hover { background: rgba(255,69,96,.1); }

    .form-group { margin-bottom: 18px; }
    .form-label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; display: block; margin-bottom: 6px; }
    .form-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
    }
    .form-input:focus { border-color: var(--accent); }

    table { width: 100%; border-collapse: collapse; }
    th { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); }
    td { padding: 12px 14px; border-bottom: 1px solid rgba(37,43,52,.6); font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }

    .tag { font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 3px; font-weight: 700; }
    .tag-entrada { background: rgba(0,229,160,.12); color: var(--accent); }
    .tag-saida   { background: rgba(0,153,255,.12); color: var(--accent2); }

    .flex { display: flex; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: 8px; }
    .gap-4 { gap: 16px; }
    .mb-4 { margin-bottom: 16px; }
    .mb-6 { margin-bottom: 24px; }
    .text-muted { color: var(--muted); }
    .mono { font-family: var(--mono); }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.03) 2px, rgba(0,0,0,.03) 4px);
      pointer-events: none;
      z-index: 9999;
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    FACE<br>PRESENÇA
    <span>Reconhecimento facial</span>
  </div>
  <nav class="nav">
    <a href="/" class="{% if request.path=='/' %}active{% endif %}">
      <span class="icon">◉</span> Dashboard
    </a>
    <a href="/cadastrar" class="{% if request.path=='/cadastrar' %}active{% endif %}">
      <span class="icon">＋</span> Cadastrar
    </a>
    <a href="/alunos" class="{% if request.path=='/alunos' %}active{% endif %}">
      <span class="icon">≡</span> Alunos
    </a>
    <a href="/relatorio" class="{% if request.path=='/relatorio' %}active{% endif %}">
      <span class="icon">▤</span> Relatório
    </a>
  </nav>
  <div class="sidebar-status">
    <div id="tb-status">
      <span class="dot {% if tb_ok %}on{% else %}off{% endif %}"></span>
      ThingsBoard
    </div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <h1>{% block page_title %}{% endblock %}</h1>
    {% block topbar_extra %}{% endblock %}
  </div>
  <div class="content">
    {% block content %}{% endblock %}
  </div>
</div>

<script>
  setInterval(async () => {
    const r = await fetch('/api/status');
    const d = await r.json();
    const dot = document.querySelector('.dot');
    if (dot) { dot.className = 'dot ' + (d.thingsboard ? 'on' : 'off'); }
  }, 15000);
</script>
{% block extra_js %}{% endblock %}
</body>
</html>

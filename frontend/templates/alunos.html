{% extends "base.html" %}
{% block title %}Alunos Cadastrados{% endblock %}
{% block page_title %}/ alunos cadastrados{% endblock %}

{% block topbar_extra %}
  <a href="/cadastrar" class="btn btn-primary" style="padding:7px 16px;font-size:11px">＋ novo aluno</a>
{% endblock %}

{% block content %}
<div class="card">
  <div id="alunos-container">
    <p class="text-muted mono" style="font-size:12px;padding:16px 0;">Carregando alunos...</p>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  async function carregarAlunos() {
    const container = document.getElementById('alunos-container');
    console.log("Iniciando carregamento de alunos...");
    try {
      const res = await fetch('/api/alunos');
      console.log("Resposta da API recebida:", res.status);
      
      if (!res.ok) {
        throw new Error(`Erro na API: ${res.status}`);
      }

      const alunos = await res.json();
      console.log("Dados dos alunos recebidos:", alunos);

      if (!alunos || alunos.length === 0) {
        container.innerHTML = `
          <div style="padding: 24px; text-align: center;">
            <p class="text-muted mono" style="font-size:14px; margin-bottom: 12px;">Nenhum aluno cadastrado no momento.</p>
            <a href="/cadastrar" class="btn btn-primary" style="display: inline-block;">Cadastre o primeiro aluno →</a>
          </div>`;
        return;
      }

      let html = `
        <table style="width: 100%; border-collapse: collapse;">
          <thead>
            <tr style="text-align: left; border-bottom: 1px solid var(--border);">
              <th style="padding: 12px 8px;">#</th>
              <th style="padding: 12px 8px;">nome</th>
              <th style="padding: 12px 8px;">matrícula</th>
              <th style="padding: 12px 8px;">turma</th>
              <th style="padding: 12px 8px;">cadastrado em</th>
              <th style="padding: 12px 8px; text-align: right;">ações</th>
            </tr>
          </thead>
          <tbody>
      `;

      alunos.forEach(a => {
        let dataStr = a.cadastrado_em || '—';
        if (dataStr !== '—' && dataStr.includes('T')) {
            dataStr = dataStr.split('.')[0].replace('T', ' ');
        }

        html += `
          <tr style="border-bottom: 1px solid var(--border);">
            <td class="mono text-muted" style="padding: 12px 8px;">${a.id}</td>
            <td style="padding: 12px 8px;"><strong>${a.nome}</strong></td>
            <td class="mono" style="padding: 12px 8px;">${a.matricula}</td>
            <td class="mono" style="padding: 12px 8px;">${a.turma || '—'}</td>
            <td class="mono text-muted" style="padding: 12px 8px; font-size:12px">${dataStr}</td>
            <td style="padding: 12px 8px; text-align: right; display: flex; gap: 8px; justify-content: flex-end;">
              <button onclick="editarAluno(${a.id}, '${a.nome}', '${a.turma || ''}')" class="btn btn-ghost" style="padding:6px 10px; font-size:11px;">editar</button>
              <button onclick="deletarAluno(${a.id}, '${a.nome}')" class="btn btn-danger" style="padding:6px 10px; font-size:11px;">remover</button>
            </td>
          </tr>
        `;
      });

      html += "</tbody></table>";
      container.innerHTML = html;
    } catch (e) {
      console.error("Erro detectado:", e);
      container.innerHTML = `
        <div style="padding: 24px; color: var(--danger); font-family: var(--mono);">
          <p>Erro ao carregar dados dos alunos.</p>
          <p style="font-size: 11px; margin-top: 8px;">Detalhe: ${e.message}</p>
          <button onclick="carregarAlunos()" class="btn btn-ghost" style="margin-top: 12px;">Tentar novamente</button>
        </div>`;
    }
  }

  async function editarAluno(id, nomeAtual, turmaAtual) {
    const novoNome = prompt("Novo nome para " + nomeAtual + ":", nomeAtual);
    if (novoNome === null) return;
    
    const novaTurma = prompt("Nova turma:", turmaAtual);
    if (novaTurma === null) return;
    
    try {
      const res = await fetch(`/api/alunos/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome: novoNome, turma: novaTurma })
      });
      
      if (res.ok) {
        carregarAlunos();
      } else {
        const err = await res.json();
        alert("Erro: " + (err.erro || "Falha ao editar"));
      }
    } catch (e) {
      console.error(e);
      alert("Erro na conexão.");
    }
  }

  async function deletarAluno(id, nome) {
    if (!confirm(`Remover aluno ${nome}? Esta ação apagará também os registros de presença.`)) return;
    
    try {
      const res = await fetch(`/api/alunos/${id}`, { method: 'DELETE' });
      if (res.ok) {
        carregarAlunos();
      } else {
        alert("Erro ao remover aluno.");
      }
    } catch (e) {
      console.error(e);
    }
  }

  window.onload = carregarAlunos;
</script>
{% endblock %}
